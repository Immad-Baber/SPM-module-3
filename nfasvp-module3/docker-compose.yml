version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nfasvp-backend
    ports:
      - "4003:4003"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4003/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nfasvp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nfasvp-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - nfasvp-network

networks:
  nfasvp-network:
    driver: bridge
